<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="HiDecon: hierarchical deconvolution of rare cell types">
  <rect width="400" height="240" fill="#fbfaf7"/>
  <!-- hierarchy tree -->
  <g stroke="#8a7a4a" stroke-width="1.3" fill="none">
    <path d="M200 30 L80 80"/>
    <path d="M200 30 L200 80"/>
    <path d="M200 30 L320 80"/>
    <path d="M80 80 L40 140"/>
    <path d="M80 80 L120 140"/>
    <path d="M200 80 L170 140"/>
    <path d="M200 80 L230 140"/>
    <path d="M320 80 L290 140"/>
    <path d="M320 80 L360 140"/>
    <path d="M40 140 L20 200"/>
    <path d="M40 140 L60 200"/>
    <path d="M120 140 L100 200"/>
    <path d="M120 140 L140 200"/>
    <path d="M170 140 L160 200"/>
    <path d="M170 140 L180 200"/>
    <path d="M230 140 L220 200"/>
    <path d="M230 140 L250 200"/>
    <path d="M290 140 L280 200"/>
    <path d="M290 140 L300 200"/>
    <path d="M360 140 L340 200"/>
    <path d="M360 140 L380 200"/>
  </g>
  <!-- root -->
  <g>
    <circle cx="200" cy="30" r="9" fill="#5a6b4a"/>
    <text x="200" y="18" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#3a4a2a">all cells</text>
  </g>
  <!-- level 2 nodes -->
  <circle cx="80" cy="80" r="7" fill="#8a7a4a"/>
  <circle cx="200" cy="80" r="7" fill="#8a7a4a"/>
  <circle cx="320" cy="80" r="7" fill="#8a7a4a"/>
  <!-- level 3 nodes -->
  <circle cx="40" cy="140" r="5.5" fill="#a8924a"/>
  <circle cx="120" cy="140" r="5.5" fill="#a8924a"/>
  <circle cx="170" cy="140" r="5.5" fill="#a8924a"/>
  <circle cx="230" cy="140" r="5.5" fill="#a8924a"/>
  <circle cx="290" cy="140" r="5.5" fill="#a8924a"/>
  <circle cx="360" cy="140" r="5.5" fill="#a8924a"/>
  <!-- leaves - most are normal size, one rare (smaller, highlighted) -->
  <g>
    <circle cx="20" cy="200" r="6" fill="#c48554"/>
    <circle cx="60" cy="200" r="6" fill="#c48554"/>
    <circle cx="100" cy="200" r="6" fill="#c48554"/>
    <circle cx="140" cy="200" r="6" fill="#c48554"/>
    <circle cx="160" cy="200" r="6" fill="#c48554"/>
    <!-- rare cell type highlighted -->
    <circle cx="180" cy="200" r="4" fill="#c44a36" stroke="#7a2010" stroke-width="1.2"/>
    <text x="180" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#7a2010">rare</text>
    <circle cx="220" cy="200" r="6" fill="#c48554"/>
    <circle cx="250" cy="200" r="6" fill="#c48554"/>
    <circle cx="280" cy="200" r="6" fill="#c48554"/>
    <circle cx="300" cy="200" r="6" fill="#c48554"/>
    <circle cx="340" cy="200" r="6" fill="#c48554"/>
    <circle cx="380" cy="200" r="6" fill="#c48554"/>
  </g>
  <!-- subtle highlight pulse around rare -->
  <circle cx="180" cy="200" r="10" fill="none" stroke="#c44a36" stroke-width="0.8" opacity="0.5"/>
  <circle cx="180" cy="200" r="14" fill="none" stroke="#c44a36" stroke-width="0.6" opacity="0.3"/>
</svg>
