<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="BLEND: probabilistic individualized reference integration">
  <defs>
    <radialGradient id="blendCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e6d4a6"/>
      <stop offset="1" stop-color="#b8924a"/>
    </radialGradient>
  </defs>
  <rect width="400" height="240" fill="#fbfaf7"/>
  <!-- multiple reference donors, each a scatter of dots in a ring -->
  <g>
    <!-- donor 1 -->
    <g transform="translate(60,70)">
      <circle cx="0" cy="0" r="28" fill="none" stroke="#8a7a4a" stroke-width="0.8" stroke-dasharray="2 2"/>
      <g fill="#b86a7a" opacity="0.75">
        <circle cx="-10" cy="-8" r="3"/><circle cx="8" cy="-12" r="3"/>
        <circle cx="12" cy="6" r="3"/><circle cx="-6" cy="10" r="3"/>
      </g>
      <g fill="#5a8fa8" opacity="0.75">
        <circle cx="-18" cy="2" r="2.5"/><circle cx="2" cy="18" r="2.5"/>
      </g>
      <text x="0" y="46" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#6a5a3a">donor 1</text>
    </g>
    <!-- donor 2 -->
    <g transform="translate(60,170)">
      <circle cx="0" cy="0" r="28" fill="none" stroke="#8a7a4a" stroke-width="0.8" stroke-dasharray="2 2"/>
      <g fill="#b86a7a" opacity="0.75">
        <circle cx="8" cy="-10" r="3"/><circle cx="-6" cy="-14" r="3"/>
        <circle cx="-14" cy="6" r="3"/>
      </g>
      <g fill="#5a8fa8" opacity="0.75">
        <circle cx="14" cy="8" r="2.5"/><circle cx="4" cy="16" r="2.5"/><circle cx="-8" cy="18" r="2.5"/>
      </g>
      <text x="0" y="46" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#6a5a3a">donor 2</text>
    </g>
    <!-- donor 3 (ellipsis) -->
    <g transform="translate(60,120)" fill="#8a7a4a">
      <circle cx="-5" cy="0" r="1.5"/><circle cx="0" cy="0" r="1.5"/><circle cx="5" cy="0" r="1.5"/>
    </g>
  </g>
  <!-- arrows converging -->
  <g stroke="#8a7a4a" stroke-width="1.2" fill="none" opacity="0.7">
    <path d="M100 70 Q 160 70 190 110"/>
    <path d="M100 170 Q 160 170 190 130"/>
  </g>
  <!-- probabilistic integration / posterior node -->
  <g transform="translate(220,120)">
    <circle cx="0" cy="0" r="42" fill="url(#blendCore)" opacity="0.9"/>
    <!-- posterior density curves -->
    <g stroke="#5a4a2a" stroke-width="1" fill="none">
      <path d="M-32 -4 Q -20 -26 -8 -4 Q 4 14 20 -4 Q 30 -14 36 -4"/>
      <path d="M-32 8 Q -18 -14 -4 8 Q 8 22 22 8 Q 30 -2 36 8" opacity="0.6"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#5a4a2a">posterior integration</text>
  </g>
  <!-- output to subject with weighted blend -->
  <g stroke="#8a7a4a" stroke-width="1.2" fill="none" opacity="0.7">
    <path d="M265 120 L 320 120" marker-end="url(#blendArr)"/>
  </g>
  <defs>
    <marker id="blendArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#8a7a4a"/>
    </marker>
  </defs>
  <!-- personalized result -->
  <g transform="translate(335,90)">
    <rect x="0" y="0" width="50" height="60" rx="4" fill="#fff" stroke="#8a7a4a" stroke-width="1.3"/>
    <rect x="5" y="8" width="40" height="7" fill="#b86a7a" opacity="0.85"/>
    <rect x="5" y="20" width="28" height="7" fill="#5a8fa8" opacity="0.85"/>
    <rect x="5" y="32" width="20" height="7" fill="#c4a654" opacity="0.85"/>
    <rect x="5" y="44" width="12" height="7" fill="#8aa85a" opacity="0.85"/>
    <text x="25" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#6a5a3a">subject</text>
  </g>
</svg>
