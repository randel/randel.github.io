<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="HMBART: heterogeneous causal mediation with BART">
  <rect width="400" height="240" fill="#fbfaf7"/>
  <!-- mediation DAG -->
  <g font-family="Georgia, serif" font-size="12" font-style="italic">
    <!-- T node -->
    <circle cx="50" cy="120" r="22" fill="#fff" stroke="#4a6b8a" stroke-width="1.6"/>
    <text x="50" y="125" text-anchor="middle" fill="#2e4858" font-weight="bold">T</text>
    <text x="50" y="158" text-anchor="middle" font-size="9" fill="#5a5a5a">treatment</text>
    <!-- M node -->
    <circle cx="200" cy="60" r="22" fill="#fff" stroke="#8a5a4a" stroke-width="1.6"/>
    <text x="200" y="65" text-anchor="middle" fill="#6b3a2e" font-weight="bold">M</text>
    <text x="200" y="30" text-anchor="middle" font-size="9" fill="#5a5a5a">mediator</text>
    <!-- Y node -->
    <circle cx="350" cy="120" r="22" fill="#fff" stroke="#5a7a4a" stroke-width="1.6"/>
    <text x="350" y="125" text-anchor="middle" fill="#334a22" font-weight="bold">Y</text>
    <text x="350" y="158" text-anchor="middle" font-size="9" fill="#5a5a5a">outcome</text>
    <!-- arrows -->
    <g stroke="#4a4a4a" stroke-width="1.4" fill="none">
      <path d="M68 108 Q 130 75 180 62" marker-end="url(#hmbartArr)"/>
      <path d="M220 70 Q 290 95 332 110" marker-end="url(#hmbartArr)"/>
      <path d="M72 120 L 328 120" marker-end="url(#hmbartArr)" stroke-dasharray="4 3"/>
    </g>
    <defs>
      <marker id="hmbartArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M0 0 L10 5 L0 10 z" fill="#4a4a4a"/>
      </marker>
    </defs>
    <text x="200" y="138" text-anchor="middle" font-size="9" fill="#7a7a7a">direct effect</text>
  </g>
  <!-- Small BART tree icons inside or around M, hinting at heterogeneity -->
  <g transform="translate(145,180)" stroke="#8a5a4a" stroke-width="1" fill="none">
    <!-- tree 1 -->
    <g transform="translate(0,0)">
      <path d="M10 0 L4 12 M10 0 L16 12 M4 12 L0 24 M4 12 L8 24 M16 12 L12 24 M16 12 L20 24"/>
      <circle cx="10" cy="0" r="2" fill="#8a5a4a"/>
      <circle cx="4" cy="12" r="1.8" fill="#8a5a4a"/>
      <circle cx="16" cy="12" r="1.8" fill="#8a5a4a"/>
      <circle cx="0" cy="24" r="2.2" fill="#c48554"/>
      <circle cx="8" cy="24" r="2.2" fill="#c48554"/>
      <circle cx="12" cy="24" r="2.2" fill="#c48554"/>
      <circle cx="20" cy="24" r="2.2" fill="#c48554"/>
    </g>
    <!-- tree 2 -->
    <g transform="translate(35,0)">
      <path d="M10 0 L4 12 M10 0 L16 12 M16 12 L12 24 M16 12 L20 24"/>
      <circle cx="10" cy="0" r="2" fill="#8a5a4a"/>
      <circle cx="4" cy="12" r="2.2" fill="#c48554"/>
      <circle cx="16" cy="12" r="1.8" fill="#8a5a4a"/>
      <circle cx="12" cy="24" r="2.2" fill="#c48554"/>
      <circle cx="20" cy="24" r="2.2" fill="#c48554"/>
    </g>
    <!-- tree 3 -->
    <g transform="translate(70,0)">
      <path d="M10 0 L4 12 M10 0 L16 12 M4 12 L0 24 M4 12 L8 24"/>
      <circle cx="10" cy="0" r="2" fill="#8a5a4a"/>
      <circle cx="4" cy="12" r="1.8" fill="#8a5a4a"/>
      <circle cx="16" cy="12" r="2.2" fill="#c48554"/>
      <circle cx="0" cy="24" r="2.2" fill="#c48554"/>
      <circle cx="8" cy="24" r="2.2" fill="#c48554"/>
    </g>
    <!-- ellipsis -->
    <g transform="translate(105,12)" fill="#8a5a4a" stroke="none">
      <circle cx="0" cy="0" r="1.3"/><circle cx="5" cy="0" r="1.3"/><circle cx="10" cy="0" r="1.3"/>
    </g>
    <!-- tree 4 -->
    <g transform="translate(125,0)">
      <path d="M10 0 L4 12 M10 0 L16 12 M4 12 L0 24 M4 12 L8 24 M16 12 L16 24"/>
      <circle cx="10" cy="0" r="2" fill="#8a5a4a"/>
      <circle cx="4" cy="12" r="1.8" fill="#8a5a4a"/>
      <circle cx="16" cy="12" r="2.2" fill="#c48554"/>
      <circle cx="0" cy="24" r="2.2" fill="#c48554"/>
      <circle cx="8" cy="24" r="2.2" fill="#c48554"/>
      <circle cx="16" cy="24" r="2.2" fill="#c48554"/>
    </g>
  </g>
  <text x="200" y="226" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#6b3a2e">ensemble of trees → heterogeneous effects</text>
</svg>
