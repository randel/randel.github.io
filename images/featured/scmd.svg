<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="scMD: single-cell DNA methylation deconvolution">
  <defs>
    <linearGradient id="smdDNA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b9bc4"/>
      <stop offset="1" stop-color="#3e6b94"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="#fbfaf7"/>
  <!-- DNA strand with methyl marks across top -->
  <g transform="translate(30,30)">
    <path d="M0 20 Q 20 0 40 20 T 80 20 T 120 20 T 160 20 T 200 20 T 240 20 T 280 20 T 320 20 T 340 20"
          fill="none" stroke="url(#smdDNA)" stroke-width="2.2"/>
    <path d="M0 28 Q 20 48 40 28 T 80 28 T 120 28 T 160 28 T 200 28 T 240 28 T 280 28 T 320 28 T 340 28"
          fill="none" stroke="url(#smdDNA)" stroke-width="2.2" opacity="0.6"/>
    <g>
      <circle cx="20" cy="4" r="4.5" fill="#c44a36" stroke="#8a2f20" stroke-width="0.8"/>
      <circle cx="60" cy="4" r="4.5" fill="#fff" stroke="#8a2f20" stroke-width="1"/>
      <circle cx="100" cy="4" r="4.5" fill="#c44a36" stroke="#8a2f20" stroke-width="0.8"/>
      <circle cx="140" cy="4" r="4.5" fill="#c44a36" stroke="#8a2f20" stroke-width="0.8"/>
      <circle cx="180" cy="4" r="4.5" fill="#fff" stroke="#8a2f20" stroke-width="1"/>
      <circle cx="220" cy="4" r="4.5" fill="#c44a36" stroke="#8a2f20" stroke-width="0.8"/>
      <circle cx="260" cy="4" r="4.5" fill="#fff" stroke="#8a2f20" stroke-width="1"/>
      <circle cx="300" cy="4" r="4.5" fill="#c44a36" stroke="#8a2f20" stroke-width="0.8"/>
      <circle cx="330" cy="4" r="4.5" fill="#c44a36" stroke="#8a2f20" stroke-width="0.8"/>
    </g>
    <text x="170" y="70" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#3e6b94">single-cell DNA methylation reference</text>
  </g>
  <!-- three cell reference profiles — tighter spacing, smaller radius to clear the fractions panel -->
  <g transform="translate(25,135)">
    <g>
      <circle cx="26" cy="26" r="23" fill="#fff" stroke="#3e6b94" stroke-width="1.5"/>
      <g fill="#c44a36">
        <circle cx="20" cy="20" r="2.4"/><circle cx="33" cy="22" r="2.4"/>
        <circle cx="18" cy="33" r="2.4"/><circle cx="30" cy="35" r="2.4"/>
        <circle cx="26" cy="26" r="2.4"/>
      </g>
      <text x="26" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2e4858">type A</text>
    </g>
    <g transform="translate(78,0)">
      <circle cx="26" cy="26" r="23" fill="#fff" stroke="#3e6b94" stroke-width="1.5"/>
      <g fill="#c44a36">
        <circle cx="18" cy="25" r="2.4"/><circle cx="32" cy="18" r="2.4"/>
      </g>
      <g fill="none" stroke="#c44a36" stroke-width="1">
        <circle cx="25" cy="33" r="2"/><circle cx="35" cy="31" r="2"/>
      </g>
      <text x="26" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2e4858">type B</text>
    </g>
    <g transform="translate(156,0)">
      <circle cx="26" cy="26" r="23" fill="#fff" stroke="#3e6b94" stroke-width="1.5"/>
      <g fill="#c44a36">
        <circle cx="20" cy="20" r="2.4"/><circle cx="30" cy="25" r="2.4"/>
        <circle cx="20" cy="33" r="2.4"/><circle cx="33" cy="35" r="2.4"/>
      </g>
      <g fill="none" stroke="#c44a36" stroke-width="1">
        <circle cx="26" cy="26" r="2"/>
      </g>
      <text x="26" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2e4858">type C</text>
    </g>
  </g>
  <!-- cell fractions panel — moved right, clearly separated from type C -->
  <g transform="translate(270,125)" font-family="Georgia, serif" font-size="11" fill="#3e3e3e">
    <text x="0" y="0" font-style="italic" fill="#3e6b94">cell-type</text>
    <text x="0" y="14" font-style="italic" fill="#3e6b94">fractions</text>
    <rect x="-4" y="24" width="80" height="8" fill="#c44a36" opacity="0.8"/>
    <rect x="-4" y="34" width="50" height="8" fill="#5a8fa8" opacity="0.8"/>
    <rect x="-4" y="44" width="30" height="8" fill="#c4a654" opacity="0.8"/>
    <rect x="-4" y="54" width="18" height="8" fill="#8aa85a" opacity="0.8"/>
  </g>
</svg>
